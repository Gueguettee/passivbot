services:
  passivbot:
    profiles:
      - default
    build:
      context: .
      dockerfile: Dockerfile
    image: passivbot:latest
    container_name: passivbot
    restart: unless-stopped
    shm_size: '2gb'
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./:/app/
    working_dir: /app
    # Default command runs src/main.py; override as needed
    #command: python src/main.py configs/examples/forager_long_only.json
    #command: python src/backtest.py configs/examples/top20mcap.json
    #command: python src/optimize.py configs/examples/forager_long_only.json
    
  passivbot-live:
    profiles:
     - live
    build:
      context: .
      dockerfile: Dockerfile_live
    image: passivbot-live:latest
    container_name: passivbot-live
    restart: unless-stopped
    environment:
      PB_USER: ${PB_USER:-binance_01}
      PB_CONFIG_PATH: ${PB_CONFIG_PATH:-/app/configs/original/hype_dio_masterclas_binance_opti/hype_dio_masterclas_binance_opti.json}
      SKIP_CCXT_ASSERT: "1"
    volumes:
      - ./configs/:/app/configs/
      - ./api-keys.json:/app/api-keys.json
    working_dir: /app

  passivbot-live-hl:
    profiles:
     - live-hl
    build:
      context: .
      dockerfile: Dockerfile_live
    image: passivbot-live:latest
    container_name: passivbot-live-hl
    restart: unless-stopped
    environment:
      PB_USER: ${PB_USER:-hyperliquid_01}
      PB_CONFIG_PATH: ${PB_CONFIG_PATH:-/app/configs/original/hype_dio_masterclass/hype_dio_masterclass.json}
      SKIP_CCXT_ASSERT: "1"
    volumes:
      - ./configs/:/app/configs/
      - ./api-keys.json:/app/api-keys.json
    working_dir: /app

    # Example:
    # PB_USER=bitget_01 docker compose --profile live up passivbot-live
    # command: ["--log-level", "info"]
    
